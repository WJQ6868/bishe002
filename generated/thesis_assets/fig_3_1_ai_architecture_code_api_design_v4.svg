  <text x="1600" y="1015" text-anchor="middle" class="note">说明：该图将角色入口、前端页面、接口分组、AI能力与底层数据放到同一条设计链上，</text>
  <text x="1600" y="1045" text-anchor="middle" class="note">用于说明结构关系、代码组织与接口协同方式。</text>
